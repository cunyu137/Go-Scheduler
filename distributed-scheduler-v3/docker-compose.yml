version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: ds_v3_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scheduler_v3
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3308:3306"
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: ds_v3_redis
    ports:
      - "6380:6379"
